<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دستیار حقوقی - آفلاین</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      overflow: hidden;
      position: relative;
    }
    .bg-pattern {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(234, 179, 8, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(234, 179, 8, 0.05) 0%, transparent 50%);
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 420px;
    }
    .icon-wrapper {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      position: relative;
    }
    .icon-wrapper img {
      width: 100%;
      height: 100%;
      border-radius: 24px;
      opacity: 0.7;
    }
    .pulse-ring {
      position: absolute;
      inset: -8px;
      border: 2px solid rgba(234, 179, 8, 0.3);
      border-radius: 28px;
      animation: pulse 2.5s ease-in-out infinite;
    }
    .pulse-ring:nth-child(2) { animation-delay: 0.8s; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.08); opacity: 0; }
    }
    .wifi-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      color: #eab308;
      opacity: 0.9;
    }
    .wifi-icon svg { width: 100%; height: 100%; }
    .line-through {
      position: absolute;
      width: 72px;
      height: 3px;
      background: #ef4444;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      border-radius: 2px;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #eab308, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      font-size: 1rem;
      color: #94a3b8;
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 32px;
      background: linear-gradient(135deg, #eab308, #d97706);
      color: #0f172a;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(234, 179, 8, 0.3);
    }
    .retry-btn:active { transform: translateY(0); }
    .retry-icon {
      width: 18px;
      height: 18px;
      transition: transform 0.3s;
    }
    .retry-btn:hover .retry-icon { transform: rotate(180deg); }
    .footer-note {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #475569;
    }
    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 2rem;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #eab308;
      animation: blink 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="container">
    <div class="icon-wrapper">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <img src="/icon-192.png" alt="دستیار حقوقی">
    </div>

    <div class="wifi-icon" style="position:relative;">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 18.75h.008v.008H12v-.008z"/>
      </svg>
      <div class="line-through"></div>
    </div>

    <h1>اتصال اینترنت قطع است</h1>
    <p>
      برای استفاده از دستیار حقوقی هوشمند به اتصال اینترنت نیاز دارید.
      <br>لطفاً اتصال خود را بررسی کرده و دوباره تلاش کنید.
    </p>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">
      <svg class="retry-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.992 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/>
      </svg>
      تلاش مجدد
    </button>

    <p class="footer-note">⚖️ دستیار حقوقی هوشمند • مبتنی بر هوش مصنوعی</p>
  </div>
</body>
</html>
